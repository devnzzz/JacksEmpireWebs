<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebzEmpire</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --purple: #7c3aed;
    --purple-light: #a855f7;
    --purple-glow: #9333ea;
    --dark: #0d0d12;
    --dark2: #13131c;
    --dark3: #1a1a27;
    --card: #1e1e2e;
    --border: rgba(124,58,237,0.3);
    --text: #e2e2ef;
    --muted: #6b6b8a;
  }

  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ========== BACKGROUND ========== */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(124,58,237,0.25) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(168,85,247,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 20% 60%, rgba(91,33,182,0.15) 0%, transparent 60%);
    background-color: var(--dark);
  }
  .bg-img {
    position: fixed; inset: 0; z-index: 0;
    background: url('ThemaBG.jpg') center/cover no-repeat;
    opacity: 0.08;
    filter: blur(2px);
  }
  .grid-bg {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* ========== LOGIN PAGE ========== */
  #loginPage {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
    transition: opacity 0.5s, transform 0.5s;
  }
  #loginPage.hide {
    opacity: 0; transform: scale(0.95); pointer-events: none;
  }

  .brand-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(2.8rem, 8vw, 5rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    background: linear-gradient(90deg,
      #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #c77dff, #ff6b6b
    );
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: rainbow 4s linear infinite;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(168,85,247,0.4));
  }
  @keyframes rainbow {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  .brand-sub {
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .login-card {
    background: rgba(30,30,46,0.8);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    width: 100%;
    max-width: 380px;
    backdrop-filter: blur(20px);
    box-shadow:
      0 0 40px rgba(124,58,237,0.15),
      0 20px 60px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
  }
  .login-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--purple-light), transparent);
  }

  .input-group {
    margin-bottom: 18px;
  }
  .input-group label {
    display: block;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--purple-light);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .input-group input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(124,58,237,0.35);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .input-group input:focus {
    border-color: var(--purple-light);
    box-shadow: 0 0 0 3px rgba(168,85,247,0.15);
  }
  .input-group input::placeholder { color: var(--muted); }

  .login-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--purple), var(--purple-light));
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.2s, box-shadow 0.3s, opacity 0.3s;
    position: relative;
    overflow: hidden;
  }
  .login-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(124,58,237,0.5);
  }
  .login-btn:active:not(:disabled) { transform: translateY(0); }
  .login-btn:disabled {
    opacity: 0.6; cursor: not-allowed;
  }
  .btn-cd {
    font-size: 0.8rem;
    font-weight: 400;
    opacity: 0.85;
  }

  /* ========== iPHONE NOTIFICATION ========== */
  .iphone-notif {
    position: fixed;
    top: 18px; left: 50%; transform: translateX(-50%) translateY(-120px);
    z-index: 9999;
    width: min(340px, 92vw);
    background: rgba(28,28,40,0.92);
    backdrop-filter: blur(30px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 14px 16px;
    box-shadow:
      0 4px 30px rgba(0,0,0,0.5),
      0 0 0 0.5px rgba(255,255,255,0.08);
    transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s;
    opacity: 0;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .iphone-notif.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .iphone-notif.hide-notif {
    transform: translateX(-50%) translateY(-120px);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.55,0,1,0.45), opacity 0.3s;
  }
  .notif-icon {
    width: 36px; height: 36px; border-radius: 9px;
    background: linear-gradient(135deg, var(--purple), var(--purple-light));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .notif-body { flex: 1; }
  .notif-app {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); font-weight: 600; margin-bottom: 2px;
  }
  .notif-title {
    font-size: 0.9rem; font-weight: 700; color: var(--text);
    font-family: 'Rajdhani', sans-serif; letter-spacing: 0.03em;
  }
  .notif-msg {
    font-size: 0.78rem; color: #aaa; margin-top: 2px; line-height: 1.4;
  }
  .notif-time { font-size: 0.65rem; color: var(--muted); flex-shrink: 0; margin-top: 2px; }

  /* Cooldown progress bar inside notif */
  .notif-progress {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    border-radius: 0 0 20px 20px; overflow: hidden;
  }
  .notif-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--purple-light));
    width: 100%;
    transition: width linear;
  }

  /* ========== DASHBOARD ========== */
  #dashboard {
    position: relative; z-index: 10;
    display: none;
    opacity: 0;
    transform: scale(0.97) translateY(10px);
    transition: opacity 0.6s, transform 0.6s;
    padding: 0 0 60px;
  }
  #dashboard.show {
    display: block;
    animation: dashIn 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes dashIn {
    from { opacity: 0; transform: scale(0.97) translateY(16px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* NAV */
  .dash-nav {
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; padding: 28px 20px 0;
    gap: 16px;
  }
  .dash-logo-row {
    display: flex; align-items: center; gap: 10px;
  }
  .dash-logo-img {
    width: 36px; height: 36px; border-radius: 8px;
    background: linear-gradient(135deg, var(--purple), var(--purple-light));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .dash-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.8rem; font-weight: 700;
    background: linear-gradient(90deg, #c77dff, #4d96ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .dash-tabs {
    display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
  }
  .dash-tab {
    color: var(--muted);
    background: none; border: none;
    font-family: 'Exo 2', sans-serif; font-size: 0.95rem;
    cursor: pointer; padding: 6px 4px;
    position: relative; transition: color 0.2s;
  }
  .dash-tab::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: var(--purple-light); border-radius: 2px;
    transform: scaleX(0); transition: transform 0.2s;
  }
  .dash-tab:hover { color: var(--text); }
  .dash-tab:hover::after { transform: scaleX(1); }

  /* HERO SECTION */
  .dash-hero {
    margin: 24px 16px 0;
    background: rgba(30,30,46,0.6);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 24px;
    text-align: center;
    backdrop-filter: blur(12px);
    position: relative; overflow: hidden;
  }
  .dash-hero::before {
    content: '';
    position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(168,85,247,0.2), transparent 70%);
    pointer-events: none;
  }
  .dash-hero p { color: var(--muted); font-size: 0.9rem; margin-bottom: 16px; }
  .dash-hero-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, var(--purple), var(--purple-light));
    border: none; border-radius: 10px;
    color: #fff; padding: 12px 28px;
    font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 700;
    letter-spacing: 0.08em; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.3s;
  }
  .dash-hero-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(124,58,237,0.4);
  }

  /* PLANS */
  .plans-section {
    margin: 24px 16px 0;
    background: rgba(30,30,46,0.6);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 20px;
    backdrop-filter: blur(12px);
  }
  .plans-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.6rem; font-weight: 700;
    color: var(--purple-light);
    text-align: center; margin-bottom: 20px;
  }
  .plan-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 20px;
    margin-bottom: 16px;
  }
  .plan-card:last-child { margin-bottom: 0; }
  .plan-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.2rem; font-weight: 700;
    color: var(--purple-light);
    text-align: center; margin-bottom: 8px;
  }
  .plan-price {
    font-size: 1.5rem; font-weight: 700;
    text-align: center; color: var(--text);
    margin-bottom: 16px;
  }
  .plan-price span { font-size: 0.85rem; color: var(--muted); font-weight: 400; }
  .plan-feature {
    display: flex; align-items: center; gap: 10px;
    color: var(--muted); font-size: 0.88rem; margin-bottom: 8px;
  }
  .plan-feature::before {
    content: '✓'; color: var(--purple-light);
    font-weight: 700; font-size: 1rem;
  }
  .plan-btn {
    width: 100%; margin-top: 20px;
    padding: 12px;
    background: transparent;
    border: 2px solid var(--purple-light);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem; font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.3s, color 0.3s, box-shadow 0.3s;
  }
  .plan-btn:hover {
    background: rgba(168,85,247,0.15);
    box-shadow: 0 0 15px rgba(168,85,247,0.3);
  }

  /* ========== VIDEO PLAYER ========== */
  #videoPage {
    display: none;
    position: relative; z-index: 10;
    padding: 0 0 60px;
  }
  #videoPage.show {
    display: block;
    animation: dashIn 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  #videoPage.hide {
    animation: none !important;
    opacity: 0; transform: scale(0.95); pointer-events: none;
    transition: opacity 0.4s, transform 0.4s;
  }
  .video-nav {
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; padding: 28px 20px 0;
    gap: 16px;
  }
  .video-title-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.4rem; font-weight: 700;
    color: var(--purple-light);
    text-align: center;
    padding: 16px 16px 0;
  }
  .video-wrapper {
    margin: 16px 16px 0;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 0 30px rgba(124,58,237,0.2);
  }
  .video-wrapper video {
    width: 100%;
    display: block;
    max-height: 60vh;
    background: #000;
  }
  .video-controls {
    display: flex; align-items: center; justify-content: center;
    gap: 14px;
    padding: 16px 16px 0;
  }
  .vc-btn {
    background: linear-gradient(135deg, var(--purple), var(--purple-light));
    border: none; border-radius: 50%;
    width: 52px; height: 52px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; cursor: pointer;
    box-shadow: 0 4px 16px rgba(124,58,237,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    color: #fff;
  }
  .vc-btn:hover { transform: scale(1.08); box-shadow: 0 6px 22px rgba(124,58,237,0.6); }
  .vc-fullscreen {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    color: var(--text); font-family: 'Exo 2', sans-serif;
    font-size: 0.85rem; cursor: pointer;
    transition: background 0.2s;
  }
  .vc-fullscreen:hover { background: rgba(168,85,247,0.2); }
  .back-btn {
    display: block;
    margin: 20px auto 0;
    padding: 12px 32px;
    background: transparent;
    border: 2px solid var(--purple-light);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem; font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .back-btn:hover {
    background: rgba(168,85,247,0.15);
    box-shadow: 0 0 15px rgba(168,85,247,0.3);
  }

  /* MAINTENANCE TOAST */
  .maint-toast {
    position: fixed;
    bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: rgba(30,30,46,0.95);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 24px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem; font-weight: 600;
    color: var(--purple-light);
    z-index: 9998;
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    white-space: nowrap;
  }
  .maint-toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-img"></div>
<div class="grid-bg"></div>

<!-- iPhone Notification -->
<div class="iphone-notif" id="iphoneNotif">
  <div class="notif-icon" id="notifIcon">🔐</div>
  <div class="notif-body">
    <div class="notif-app">WebzEmpire · sekarang</div>
    <div class="notif-title" id="notifTitle">Login</div>
    <div class="notif-msg" id="notifMsg">...</div>
  </div>
  <div class="notif-time">now</div>
  <div class="notif-progress"><div class="notif-progress-bar" id="notifBar"></div></div>
</div>

<!-- Maintenance Toast -->
<div class="maint-toast" id="maintToast">🔧 On Maintance</div>

<!-- ===== LOGIN PAGE ===== -->
<div id="loginPage">
  <h1 class="brand-title">WebzEmpire</h1>
  <p class="brand-sub">Advanced System Dashboard</p>

  <div class="login-card">
    <div class="input-group">
      <label>Username</label>
      <input type="text" id="usernameInput" placeholder="Masukkan username..." autocomplete="off">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="Masukkan password...">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">
      LOGIN
    </button>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard">
  <div class="dash-nav">
    <div class="dash-logo-row">
      <div class="dash-logo-img">⚡</div>
      <div class="dash-title">WebzEmpire</div>
    </div>
    <div class="dash-tabs">
      <button class="dash-tab" onclick="showMaint(this)">Plans</button>
      <button class="dash-tab" onclick="showMaint(this)">About</button>
      <button class="dash-tab" onclick="showMaint(this)">Contact</button>
    </div>
  </div>

  <div class="dash-hero">
    <p>Welcome to WebzEmpire — Advanced System API Dashboard.</p>
  </div>

  <div class="plans-section">
    <div class="plans-title">Videos 1</div>

    <div class="plan-card">
      <div class="plan-name">Videos 1</div>
      <button class="plan-btn" onclick="openVideo('Videos1.mp4', 'Videos 1')">Select Videos</button>
    </div>

    <div class="plan-card">
      <div class="plan-name">Videos 2</div>
      <button class="plan-btn" onclick="openVideo('Videos2.mp4', 'Videos 2')">Select Videos</button>
    </div>
  </div>
</div>

<!-- ===== VIDEO PAGE ===== -->
<div id="videoPage">
  <div class="video-nav">
    <div class="dash-logo-row">
      <div class="dash-logo-img">⚡</div>
      <div class="dash-title">WebzEmpire</div>
    </div>
    <div class="dash-tabs">
      <button class="dash-tab" onclick="showMaint(this)">Plans</button>
      <button class="dash-tab" onclick="showMaint(this)">About</button>
      <button class="dash-tab" onclick="showMaint(this)">Contact</button>
    </div>
  </div>

  <div class="video-title-label" id="videoLabel">Videos 1</div>

  <div class="video-wrapper">
    <video id="mainVideo" preload="metadata"></video>
  </div>

  <div class="video-controls">
    <button class="vc-btn" id="playPauseBtn" onclick="togglePlay()">▶</button>
    <button class="vc-fullscreen" onclick="goFullscreen()">⛶ Fullscreen</button>
  </div>

  <button class="back-btn" onclick="goBack()">← Back</button>
</div>

<script>
  const VALID_USER = 'LyoVanzKey';
  const VALID_PASS = 'KeyLyovzz12';
  let cooldown = false;

  function doLogin() {
    if (cooldown) return;

    const user = document.getElementById('usernameInput').value.trim();
    const pass = document.getElementById('passwordInput').value;

    const isOk = (user === VALID_USER && pass === VALID_PASS);

    cooldown = true;
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;

    if (isOk) {
      showNotif(true, user);
      // After notif shows, wait then transition to dashboard
      setTimeout(() => {
        document.getElementById('loginPage').classList.add('hide');
        setTimeout(() => {
          document.getElementById('loginPage').style.display = 'none';
          const dash = document.getElementById('dashboard');
          dash.style.display = 'block';
          requestAnimationFrame(() => dash.classList.add('show'));
        }, 500);
      }, 1200);
    } else {
      showNotif(false, null);
      startCooldown(btn);
    }
  }

  function showNotif(success, username) {
    const notif = document.getElementById('iphoneNotif');
    const icon = document.getElementById('notifIcon');
    const title = document.getElementById('notifTitle');
    const msg = document.getElementById('notifMsg');
    const bar = document.getElementById('notifBar');

    if (success) {
      icon.textContent = '✅';
      title.textContent = 'Berhasil Login!';
      msg.textContent = `Welcome ${username}`;
    } else {
      icon.textContent = '❌';
      title.textContent = 'Login Gagal!';
      msg.textContent = 'Gagal! Mungkin Username Maupun Password Salah';
    }

    // Reset & show
    notif.classList.remove('hide-notif');
    bar.style.transition = 'none';
    bar.style.width = '100%';
    notif.classList.add('show');

    // Start progress bar
    const duration = success ? 3000 : 10000;
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        bar.style.transition = `width ${duration}ms linear`;
        bar.style.width = '0%';
      });
    });

    // Auto close
    setTimeout(() => {
      notif.classList.add('hide-notif');
      setTimeout(() => notif.classList.remove('show', 'hide-notif'), 500);
    }, duration);
  }

  function startCooldown(btn) {
    let secs = 10;
    btn.innerHTML = `LOGIN &nbsp;<span class="btn-cd">(${secs}s)</span>`;

    const iv = setInterval(() => {
      secs--;
      if (secs <= 0) {
        clearInterval(iv);
        btn.disabled = false;
        btn.innerHTML = 'LOGIN';
        cooldown = false;
      } else {
        btn.innerHTML = `LOGIN &nbsp;<span class="btn-cd">(${secs}s)</span>`;
      }
    }, 1000);
  }

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // ===== VIDEO PLAYER =====
  function openVideo(src, label) {
    const dash = document.getElementById('dashboard');
    const vp = document.getElementById('videoPage');
    const vid = document.getElementById('mainVideo');
    const lbl = document.getElementById('videoLabel');

    // Fade out dashboard
    dash.style.transition = 'opacity 0.4s, transform 0.4s';
    dash.style.opacity = '0';
    dash.style.transform = 'scale(0.97)';

    setTimeout(() => {
      dash.style.display = 'none';
      dash.style.opacity = '';
      dash.style.transform = '';

      lbl.textContent = label;
      // Map filename to raw GitHub URL
      const rawBase = 'https://raw.githubusercontent.com/devnzzz/JacksEmpireWebs/main/';
      vid.src = rawBase + src;
      vid.load();
      document.getElementById('playPauseBtn').textContent = '▶';

      vp.style.display = 'block';
      requestAnimationFrame(() => vp.classList.add('show'));
    }, 400);
  }

  function togglePlay() {
    const vid = document.getElementById('mainVideo');
    const btn = document.getElementById('playPauseBtn');
    if (vid.paused) {
      vid.play();
      btn.textContent = '⏸';
    } else {
      vid.pause();
      btn.textContent = '▶';
    }
  }

  function goFullscreen() {
    const vid = document.getElementById('mainVideo');
    if (vid.requestFullscreen) vid.requestFullscreen();
    else if (vid.webkitRequestFullscreen) vid.webkitRequestFullscreen();
    else if (vid.mozRequestFullScreen) vid.mozRequestFullScreen();
  }

  function goBack() {
    const dash = document.getElementById('dashboard');
    const vp = document.getElementById('videoPage');
    const vid = document.getElementById('mainVideo');

    // Pause video
    vid.pause();
    vid.src = '';

    // Fade out video page
    vp.style.transition = 'opacity 0.4s, transform 0.4s';
    vp.style.opacity = '0';
    vp.style.transform = 'scale(0.97)';

    setTimeout(() => {
      vp.classList.remove('show');
      vp.style.display = 'none';
      vp.style.opacity = '';
      vp.style.transform = '';

      // Smooth show dashboard
      dash.style.display = 'block';
      dash.style.opacity = '0';
      dash.style.transform = 'scale(0.97) translateY(10px)';
      dash.style.transition = 'opacity 0.5s, transform 0.5s';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          dash.style.opacity = '1';
          dash.style.transform = 'scale(1) translateY(0)';
        });
      });
    }, 400);
  }

  // ===== MAINTENANCE TOAST =====
  let maintTimer;
  function showMaint(el) {
    const toast = document.getElementById('maintToast');
    clearTimeout(maintTimer);
    toast.classList.add('show');
    maintTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }
</script>
</body>
